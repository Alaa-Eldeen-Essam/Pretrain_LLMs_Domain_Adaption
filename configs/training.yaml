model:
  hf_model_id: "unsloth/Qwen2.5-3B-Instruct-bnb-4bit"
  local_base_dir: "models/base/qwen2_5_3b_instruct_bnb_4bit"
  adapter_dir: "models/adapters/qwen2_5_3b_domain_lora"
  merged_dir: "models/merged/qwen2_5_3b_domain_merged"
  gguf_dir: "models/gguf"
  gguf_quantization: "q4_k_m"
  gguf_filename: "qwen2_5_3b_domain_q4_k_m.gguf"

ocr:
  languages: "ara+eng"
  dpi: 300
  max_pages: null
  min_page_chars: 20
  workers: 1

cleaning:
  remove_tashkeel: true
  normalize_whitespace: true
  remove_zero_width: true
  min_text_chars: 80
  repeated_line_threshold: 0.35

dataset:
  target_chars_per_sample: 7000
  max_chars_per_sample: 10000
  min_chars_per_sample: 500
  validation_ratio: 0.05
  random_seed: 42

training:
  max_seq_length: 2048
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 1
  learning_rate: 0.0001
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 100
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

ollama:
  model_name: "qwen2_5_ar_domain"
  num_ctx: 2048
  temperature: 0.2
  system_prompt: "أنت مساعد عربي متخصص في فهم المراجع الفنية والعسكرية. أجب بدقة وبأسلوب رسمي، ولا تخترع معلومات غير موجودة في السياق عند استخدامك داخل نظام استرجاع."

